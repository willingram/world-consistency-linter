name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.14"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
      UV_PYTHON_DOWNLOADS: never

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run Ruff lint
        run: uv run --frozen ruff check .

      - name: Check Ruff formatting
        run: uv run --frozen ruff format --check .

      - name: Run tests
        run: uv run --frozen pytest

  distribution:
    name: Distribution / Ubuntu / Python 3.10
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.10"
      UV_PYTHON_DOWNLOADS: never

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Build wheel and source distribution
        run: uv run --frozen python -m build

      - name: Check distribution metadata
        run: uv run --frozen twine check --strict dist/*

      - name: Inspect distribution contents
        run: uv run --frozen python scripts/inspect_distribution.py dist

      - name: Create isolated wheel environment
        run: python -m venv "$RUNNER_TEMP/wcl-wheel-smoke"

      - name: Install wheel with runtime dependencies
        run: |
          "$RUNNER_TEMP/wcl-wheel-smoke/bin/python" -m pip install dist/*.whl

      - name: Smoke-test installed commands outside source tree
        working-directory: ${{ runner.temp }}
        run: |
          "$RUNNER_TEMP/wcl-wheel-smoke/bin/wcl" --help
          "$RUNNER_TEMP/wcl-wheel-smoke/bin/wcl" --version
          "$RUNNER_TEMP/wcl-wheel-smoke/bin/world-consistency-linter" --help
          "$RUNNER_TEMP/wcl-wheel-smoke/bin/world-consistency-linter" --version
          "$RUNNER_TEMP/wcl-wheel-smoke/bin/python" -m world_consistency_linter --help
          "$RUNNER_TEMP/wcl-wheel-smoke/bin/python" -m world_consistency_linter --version
